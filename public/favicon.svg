<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Petit+Formal+Script&amp;display=swap');
      .seal-text {
        font-family: 'Petit Formal Script', cursive;
        font-size: 20px;
        font-weight: bold;
        fill: rgba(253, 250, 244, 0.92);
        /* Stroke acts as a perfect bolding agent for calligraphy fonts */
        stroke: rgba(253, 250, 244, 0.92);
        stroke-width: 0.75px;
        text-anchor: middle;
      }
    </style>

    <radialGradient id="sealGradient" cx="36%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c07d58" />
      <stop offset="55%" stop-color="#9a5f40" />
      <stop offset="100%" stop-color="#6a3f28" />
    </radialGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#1a1713" flood-opacity="0.3" />
    </filter>
  </defs>

  <circle cx="28" cy="28" r="28" fill="url(#sealGradient)" filter="url(#shadow)" />

  <text x="28" y="36" class="seal-text">dns</text>
</svg>
